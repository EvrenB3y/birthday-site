<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  text-align:center;
}

input{
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#panel{
  display:none;
  width:80%;
}

.card{
  background:#111;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div class="box" id="loginBox">
  <h2>Admin Girişi</h2>
  <input id="adminPass" type="password" placeholder="Şifre">
  <br>
  <button onclick="login()">Giriş</button>
</div>

<!-- 📊 PANEL -->
<div id="panel">
  <h1 style="color:#e50914;">Giriş Logları</h1>
  <button onclick="load()">Yenile</button>
  <div id="logs"></div>
</div>

<script>

const ADMIN_PASSWORD = "3007"; // 🔥 BURAYI DEĞİŞTİR (senin özel şifren)

const DB_URL = "https://dogum-d1b8a-default-rtdb.europe-west1.firebasedatabase.app/logs.json";

// 🔐 LOGIN
function login(){
  let pass = document.getElementById("adminPass").value;

  if(pass === ADMIN_PASSWORD){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
    load();
  } else {
    alert("Yanlış şifre ❌");
  }
}

// 📊 LOG YÜKLE
function load(){
  fetch(DB_URL)
  .then(res => res.json())
  .then(data => {

    let html = "";

    for(let key in data){
      html += `
        <div class="card">
          ⏰ ${data[key].time}<br>
          📱 ${data[key].device}
        </div>
      `;
    }

    document.getElementById("logs").innerHTML = html;
  });
}

</script>

</body>
</html>
