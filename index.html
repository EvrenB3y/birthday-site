<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Sayfa</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/*  sinema efekti */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
  pointer-events:none;
}

/*  intro */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}

#logo{
  font-size:32px;
  color:#e50914;
  font-weight:bold;
  animation:intro 2.5s ease forwards;
}

@keyframes intro{
  0%{opacity:0;transform:scale(0.7);filter:blur(10px)}
  50%{opacity:1;transform:scale(1.1)}
  100%{opacity:0;transform:scale(1.2)}
}

/*  lock */
#lock{
  display:none;
  flex-direction:column;
}

input{
  padding:12px;
  border:none;
  border-radius:8px;
  text-align:center;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/*  content */
#content{
  display:none;
  max-width:600px;
  padding:20px;
}

.show{
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/*  admin */
#admin{
  display:none;
  position:fixed;
  inset:0;
  background:#111;
  overflow:auto;
  padding:20px;
}
.log{
  background:#222;
  margin:10px 0;
  padding:10px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="intro">
  <div id="logo">Doum günün kutlu olsun</div>
</div>

<div id="lock">
  <h2>Bu sayfa özel </h2>
  <input id="pass" type="password" placeholder="ifre">
  <button onclick="check()">Giri</button>
</div>

<div id="content">
  <h1>yi ki dodun </h1>
  <p id="text"></p>
</div>

<div id="admin"></div>

<script>

const message = `Asya...

Baz insanlar ksa zamanda iz brakr.

yi ki dodun.`;

let i=0;

function type(){
  if(i < message.length){
    document.getElementById("text").innerHTML += message[i];
    i++;
    setTimeout(type,40);
  }
}

window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lock").style.display="flex";
  },2500);

  if(location.search.includes("admin")){
    showAdmin();
  }
};

function check(){
  let p = document.getElementById("pass").value;

  if(p === "290704"){
    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";
    document.getElementById("content").classList.add("show");

    type();
    logUser();
    openFull();
  } else {
    alert("Yanl ifre ");
  }
}

function openFull(){
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
}

/*  LOCAL LOG SYSTEM */
function logUser(){
  let logs = JSON.parse(localStorage.getItem("logs") || "[]");

  logs.push({
    time: new Date().toLocaleString(),
    device: navigator.userAgent
  });

  localStorage.setItem("logs", JSON.stringify(logs));
}

function showAdmin(){
  document.getElementById("admin").style.display="block";

  let logs = JSON.parse(localStorage.getItem("logs") || "[]");

  document.getElementById("admin").innerHTML = "<h2>Log Panel</h2>";

  logs.forEach(l=>{
    let div = document.createElement("div");
    div.className="log";
    div.innerText = l.time + "\n" + l.device;
    document.getElementById("admin").appendChild(div);
  });
}

</script>

</body>
</html>
